window:
  padding:
    x: 20
    y: 20
  dynamic_padding: true
  opacity: 0.98
  decorations: buttonless

  option_as_alt: Both
    
scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: "SFMono Nerd Font"
    style: Regular
  bold:
    family: "SFMono Nerd Font"
    style: Bold
  italic:
    family: "SFMono Nerd Font"
    style: Italic
  bold_italic:
    family: "SFMono Nerd Font"
    style: Bold Italic
  size: 18
draw_bold_text_with_bright_colors: true

import:
   - ~/.config/alacritty/catppuccin/catppuccin-frappe.yml
selection:
  save_to_clipboard: false


