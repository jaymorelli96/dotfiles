env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 200
    lines: 40
  padding:
    x: 5
    y: 5
  dynamic_padding: true
  class:
    instance: Alacritty
    general: Alacritty
  opacity: 0.95

  decorations: none

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 18
draw_bold_text_with_bright_colors: true

import:
  - ~/.config/alacritty/tokyonight-moon.yml
selection:
  save_to_clipboard: false

shell:
  program: /usr/bin/zsh

key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
